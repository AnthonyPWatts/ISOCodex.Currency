name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.9.0-alpha.14
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve release ref
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ "$tag" != v* ]]; then
            echo "Release tag must start with 'v'. Actual value was '$tag'." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ISOCodex.Currency.sln

      - name: Build
        run: dotnet build ISOCodex.Currency.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.release.outputs.version }}

      - name: Test
        run: dotnet test ISOCodex.Currency.sln -c Release --no-build

      - name: Pack
        shell: pwsh
        run: ./eng/pack-packages.ps1 -Configuration Release -OutputPath artifacts -Version "${{ steps.release.outputs.version }}" -ContinuousIntegrationBuild

      - name: Verify package artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $expectedPackageIds = @(
            "ISOCodex.Currency",
            "ISOCodex.Currency.Addressing",
            "ISOCodex.Currency.Analyzers",
            "ISOCodex.Currency.AspNetCore",
            "ISOCodex.Currency.Countries",
            "ISOCodex.Currency.Dapper",
            "ISOCodex.Currency.EntityFrameworkCore",
            "ISOCodex.Currency.Exchange.Abstractions",
            "ISOCodex.Currency.Json.NewtonsoftJson",
            "ISOCodex.Currency.Json.SystemTextJson",
            "ISOCodex.Currency.Validation"
          )
          $expectedPackages = @($expectedPackageIds | ForEach-Object { "$_.$version.nupkg" })
          $expectedSymbols = @($expectedPackageIds | ForEach-Object { "$_.$version.snupkg" })
          $actualPackages = @(Get-ChildItem artifacts -Filter "*.nupkg" | ForEach-Object Name | Sort-Object)
          $actualSymbols = @(Get-ChildItem artifacts -Filter "*.snupkg" | ForEach-Object Name | Sort-Object)

          $missingPackages = @($expectedPackages | Where-Object { $_ -notin $actualPackages })
          if ($missingPackages.Count -gt 0) {
            throw "Expected package artifacts were not found: $($missingPackages -join ', ')"
          }

          $missingSymbols = @($expectedSymbols | Where-Object { $_ -notin $actualSymbols })
          if ($missingSymbols.Count -gt 0) {
            throw "Expected symbol package artifacts were not found: $($missingSymbols -join ', ')"
          }

          $unexpectedPackages = @($actualPackages | Where-Object { $_ -notin $expectedPackages })
          if ($unexpectedPackages.Count -gt 0) {
            throw "Unexpected package artifacts were found: $($unexpectedPackages -join ', ')"
          }

          $unexpectedSymbols = @($actualSymbols | Where-Object { $_ -notin $expectedSymbols })
          if ($unexpectedSymbols.Count -gt 0) {
            throw "Unexpected symbol package artifacts were found: $($unexpectedSymbols -join ', ')"
          }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.release.outputs.version }}
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: AnthonyPWatts

      - name: Publish package
        shell: pwsh
        working-directory: artifacts
        run: |
          Get-ChildItem -Filter "*.nupkg" | Sort-Object Name | ForEach-Object {
            dotnet nuget push $_.Name `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
