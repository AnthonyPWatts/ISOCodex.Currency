name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, test, pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ISOCodex.Currency.sln

      - name: Build
        run: dotnet build ISOCodex.Currency.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test ISOCodex.Currency.sln -c Release --no-build --logger trx --results-directory TestResults

      - name: Pack
        shell: pwsh
        run: ./eng/pack-packages.ps1 -Configuration Release -OutputPath artifacts -ContinuousIntegrationBuild

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
